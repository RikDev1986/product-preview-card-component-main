<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
<title>Frontend Mentor | Product preview card component</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <article class="perfume">
    <picture class="perfume__picture">
      <source media="(min-width: 1440px)" srcset="./images/image-product-desktop.jpg">
      <img class="perfume__img" src="images/image-product-mobile.jpg" alt="Chanel parfume">
    </picture>
    <section class="perfume__content">
      <span class="perfume__label">
  Perfume
      </span>
    <h1 class="perfume__title">  
      Gabrielle Essence Eau De Parfum
    </h1>
    <p class="perfume__text">
  A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.
    </p>
    <div class="perfume__price">
      <span class="perfume__new-price">
  $149.99
      </span>
      <span class="perfume__old-price">
  $169.99
      </span>
    </div>
    <button class="card__cart">
  Add to Cart
  </button>
  </section>
  </article>
    </main>
</body>
</html>
